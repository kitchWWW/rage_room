<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rage Room — Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="noise-canvas" aria-hidden="true"></canvas>
  <div id="white-overlay" aria-hidden="true"></div>

  <header>
    <h1>Rage Room</h1>
    <span class="role">Admin</span>
  </header>

  <main>
    <!-- Stage 1: Load audio -->
    <section id="stage-load" class="center-stage">
      <button id="load-btn" class="big-button">Load Audio</button>
      <div class="helper">Click to preload the fixed media.</div>
    </section>

    <!-- Stage 2: Loading progress -->
    <section id="stage-progress" class="center-stage hidden">
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="progress-label" class="progress-label">Loading… 0 / 0</div>
      </div>
    </section>

    <!-- Stage 3: Ready to start -->
    <section id="stage-ready" class="center-stage hidden">
      <button id="start-btn" class="big-button">Press Start on Cue</button>
      <div class="helper">Wait to press Start with everyone else.</div>
    </section>

    <!-- Stage 4: Countdown -->
    <section id="stage-countdown" class="center-stage hidden">
      <div id="countdown" class="countdown">5</div>
    </section>

    <!-- Stage 5: Playing -->
    <section id="stage-playing" class="center-stage hidden">
      <div class="diagnostic">
        <h2>Diagnostic</h2>
        <div class="diag-row">
          <span class="diag-label">Current file</span>
          <span id="diag-file" class="diag-value">—</span>
        </div>
        <div class="diag-row">
          <span class="diag-label">File time</span>
          <span id="diag-file-time" class="diag-value">0:00 / 0:00</span>
        </div>
        <div class="diag-row">
          <span class="diag-label">Overall time</span>
          <span id="diag-total-time" class="diag-value">0:00 / 0:00</span>
        </div>
      </div>
    </section>

    <!-- Stage 6: Done -->
    <section id="stage-done" class="center-stage hidden">
      <div class="end-message">Performance complete.</div>
    </section>
  </main>

  <script src="prompts.js"></script>
  <script src="audio-engine.js"></script>
  <script src="background.js"></script>
  <script src="admin.js"></script>
</body>
</html>
